*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(160deg,#F5F5F4,#EAEAE8);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased;}

.check svg{width:30px;height:30px;stroke:var(--blue);}
h1{font-size:27px;font-weight:600;letter-spacing:-0.01em;}
p.sub{color:var(--stone-d);margin-top:12px;font-size:16px;line-height:1.6;}
.btn{display:inline-block;background:var(--ink);color:var(--paper);padding:15px 30px;border-radius:10px;font-size:16px;font-weight:600;text-decoration:none;margin-top:26px;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.note{font-size:13px;color:var(--stone);margin-top:18px;line-height:1.55;}
.back{display:inline-block;margin-top:24px;font-size:14px;color:var(--deep);text-decoration:none;}
.back:hover{text-decoration:underline;}
