<script>
(function(){
  var c=document.getElementById('neural'); if(!c) return;

  function resize(){ w=c.width=window.innerWidth; h=c.height=window.innerHeight; init(); }
  function init(){ var n=Math.min(62,Math.floor(w*h/26000)); nodes=[];
    for(var i=0;i<n;i++) nodes.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*1.5+0.6}); }
  function links(){
    var i,j;
    for(i=0;i<nodes.length;i++){
      for(j=i+1;j<nodes.length;j++){ var a=nodes[i],b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.sqrt(dx*dx+dy*dy);

    }
    for(i=0;i<nodes.length;i++){ ctx.fillStyle='rgba('+RGB+',0.65)'; ctx.beginPath(); ctx.arc(nodes[i].x,nodes[i].y,nodes[i].r,0,7); ctx.fill(); }
